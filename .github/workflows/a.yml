name: A
on:
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
      - name: Name
        run: date +${{ github.ref }}-%Y.%m.%d-%H.%M.%S > NAME
      - name: Tag
        run: git tag -a `echo NAME` -m "${{ github.ref }}"
      - name: Push
        run: git push origin `echo NAME`
      - name: Release
        run: gh release create `echo NAME` README.md
        env:
          GH_TOKEN: ${{ github.token }}
